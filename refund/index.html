<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refund Policy - Stak</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FDF8F3;
      --text: #2D2A26;
      --text-muted: #6B6560;
      --accent: #E87B4A;
      --border: #E5DED6;
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Outfit', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
    }

    .legal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .back-link {
      color: var(--accent);
      font-weight: 500;
      font-size: 0.95rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .legal-content {
      max-width: 700px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--text-muted);
      margin-bottom: 1.25rem;
      line-height: 1.75;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <nav class="legal-nav">
    <a href="/" class="logo">Stak</a>
    <a href="/" class="back-link">Back to Home</a>
  </nav>

  <div class="legal-content">
    <h1>Refund Policy</h1>
    <p>All purchases are final. No refunds will be issued after payment.</p>
    <p>If you face technical issues, contact <a href="mailto:support@stak.com">support@stak.com</a>.</p>
  </div>
</body>
</html>
